<div class="flex w-full">
  <!-- SIDEBAR -->
  <div class="sidebar h-dvh bg-blue-400 transition-all duration-300 overflow-hidden ease-in-out"
    [class]="isSidebarOpen() ? 'w-[250px]' : 'w-[70px]'">
    <!-- <button (click)="toggleSidebar2()" class="p-2">
      ☰
    </button> -->
    <nav class="flex-1 px-2 py-4" aria-label="Menu principal">
      <ul class="flex flex-col gap-1">
        @for (item of navItems; track item.route) {
        <li>
          <a [routerLink]="item.route"
            class="flex items-center gap-3 rounded-xl px-3 py-3 text-sm font-medium text-slate-700 transition-colors hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <mat-icon aria-hidden="true">{{ item.icon }}</mat-icon>

            @if (isSidebarOpen()) {
            <span>{{ item.label }}</span>
            }
          </a>
        </li>
        }
      </ul>
    </nav>
  </div>
  <div class="container-right flex flex-col flex-1">
    <mat-toolbar class="flex justify-between bg-red-500!">
      <button mat-icon-button type="button" (click)="toggleSidebar()" [attr.aria-label]="toggleAriaLabel()"
        [attr.aria-expanded]="isSidebarOpen()" aria-controls="main-sidebar">
        <mat-icon>{{ isSidebarOpen() ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
      <button mat-button type="button" [matMenuTriggerFor]="accountMenu" class="rounded-xl px-3"
        aria-label="Abrir menu da conta">
        <div class="flex items-center gap-2">
          <div
            class="flex h-8 w-8 items-center justify-center rounded-full bg-slate-200 text-sm font-semibold text-slate-700"
            aria-hidden="true">
            SR
          </div>
          <span class="hidden sm:inline">Sérgio Rocha</span>
          <mat-icon aria-hidden="true">expand_more</mat-icon>
        </div>
      </button>

      <mat-menu #accountMenu="matMenu">
        <button mat-menu-item type="button">
          <mat-icon aria-hidden="true">person</mat-icon>
          <span>Perfil</span>
        </button>

        <button mat-menu-item type="button">
          <mat-icon aria-hidden="true">settings</mat-icon>
          <span>Settings</span>
        </button>
      </mat-menu>
    </mat-toolbar>
    <div class="p-5 w-full">
      <router-outlet />
    </div>
  </div>
</div>
