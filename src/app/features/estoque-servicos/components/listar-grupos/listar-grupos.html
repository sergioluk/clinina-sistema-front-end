<div class="p-3">
  <div class="flex justify-between items-center py-4">
    <app-icon (click)="fechar()" class="text-4xl" name="left-arrow"></app-icon>
    <h2 class="text-4xl">Selecionar grupo</h2>
    <div></div>
  </div>
  <hr>
  <div class="mt-4">
    <mat-form-field class="w-full" appearance="outline">
      <span matTextPrefix><app-icon name="search"></app-icon></span>
      <mat-label>Grupo</mat-label>
      <input matInput [formControl]="pesquisarGrupo">
    </mat-form-field>
  </div>
  <mat-dialog-content class="flex! gap-3! flex-col! p-0!">
      @for (categoria of filteredCategorias$ | async; track categoria.nome) {

        <!-- título da categoria -->
        <div class="p-3! text-lg border border-gray-300 rounded-md bg-gray-200">
          {{ categoria.nome }}
        </div>

        <!-- itens -->
        @for (grupo of categoria.itens; track grupo.id) {
          <div
            class="p-3! text-lg border border-gray-300 rounded-md cursor-pointer"
            (click)="selecionarGrupo(grupo)"
          >
            {{ grupo.nome }}
          </div>
        }

      }
    </mat-dialog-content>
  <button class="w-full mt-4" matButton="filled" (click)="criarGrupo()">Adicionar novo grupo</button>

</div>
