<div class="p-3">
  <div class="flex justify-between items-center py-4">
    <app-icon (click)="fechar()" class="text-4xl" name="left-arrow"></app-icon>
    <h2 class="text-4xl">Selecionar marca</h2>
    <div></div>
  </div>
  <hr>
  <div class="mt-4">
    <mat-form-field class="w-full" appearance="outline">
      <span matTextPrefix><app-icon name="search"></app-icon></span>
      <mat-label>Marca</mat-label>
      <input matInput [formControl]="pesquisarMarca">
    </mat-form-field>
    <div class="flex gap-3 flex-col">
      @for (marca of filteredMarcas$ | async; track marca.id) {
      <div class="p-3 text-lg border border-gray-300 rounded-md cursor-pointer" (click)="selecionarMarca(marca)">
        {{marca.nome}}
      </div>
      }
    </div>
  </div>
  <button class="w-full mt-4" matButton="filled" (click)="criarMarca()">Adicionar nova marca</button>

</div>
